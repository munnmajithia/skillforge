[project]
name = "skillforge-cli"
version = "0.1.0"
description = "CLI tool for the SkillForge ecosystem — scaffold, validate, install, and publish skills"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "skillforge-core",
    "click>=8.1",
    "rich>=13.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[project.scripts]
skillforge = "skillforge_cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv.sources]
skillforge-core = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
