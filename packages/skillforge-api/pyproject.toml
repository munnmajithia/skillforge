[project]
name = "skillforge-api"
version = "0.1.0"
description = "FastAPI backend for the SkillForge skill ecosystem"
requires-python = ">=3.11"
dependencies = [
    "skillforge-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "pytest>=7.0",
    "httpx>=0.27",
]
license = "Apache-2.0"

[tool.uv.sources]
skillforge-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest-asyncio>=0.23",
]
