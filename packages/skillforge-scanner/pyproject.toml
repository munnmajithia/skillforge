[project]
name = "skillforge-scanner"
version = "0.1.0"
description = "Security scanner for SkillForge skill packs"
requires-python = ">=3.11"
dependencies = [
    "skillforge-core",
    "pydantic>=2.0",
]
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
